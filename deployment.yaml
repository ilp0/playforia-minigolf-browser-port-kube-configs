apiVersion: apps/v1
kind: Deployment
metadata:
  name: minigolf
  namespace: minigolf
  labels:
    app: minigolf
spec:
  # Server state (lobbies, games, daily room) is in-memory only, so a second
  # replica would be a separate world. Keep at 1 unless/until state moves out.
  replicas: 1
  strategy:
    # Game sessions die on restart anyway — replace cleanly instead of running
    # two pods in parallel during rollout.
    type: Recreate
  selector:
    matchLabels:
      app: minigolf
  template:
    metadata:
      labels:
        app: minigolf
    spec:
      containers:
        - name: server
          image: ghcr.io/ilp0/playforia-minigolf-browser-port:latest
          imagePullPolicy: Always
          # The image's default CMD invokes node with the TS entrypoint and
          # default flags. k8s `args` replaces CMD entirely, so we have to
          # repeat the node invocation here, not just the extra flags.
          # Wrapped in `sh -c` so stdout/stderr is tee'd to a per-pod log
          # file on the persistent volume mounted at /var/log/minigolf,
          # while still flowing to stdout for `kubectl logs`. Trap forwards
          # SIGTERM to node so the pod still shuts down within grace period.
          args:
            - "sh"
            - "-c"
            - |
              set -e
              LOGDIR=/var/log/minigolf
              LOGFILE="$LOGDIR/server-$(date -u +%Y%m%dT%H%M%SZ)-${HOSTNAME:-pod}.log"
              echo "[wrapper] logging to $LOGFILE"
              trap 'kill -TERM "$PID" 2>/dev/null' TERM INT
              node --experimental-strip-types --no-warnings src/main.ts \
                --host 0.0.0.0 --port 4242 --max-conns-per-ip 0 \
                2>&1 | tee -a "$LOGFILE" &
              PID=$!
              wait "$PID"
          env:
            # Lobby/game chat. Set to "0" (or "false"/"off"/"no") to drop
            # incoming say/sayp packets server-side — the operator opt-out
            # for hosting without moderating chat. Default in-server is
            # enabled, so omit this env var entirely if you don't care.
            - name: CHAT_ENABLED
              value: "0"
          ports:
            - name: http
              containerPort: 4242
              protocol: TCP
          volumeMounts:
            - name: logs
              mountPath: /var/log/minigolf
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 2
            periodSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 2000m
              memory: 2048Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop: ["ALL"]
      securityContext:
        # Match runAsUser so the log volume is writable by the unprivileged
        # process. local-path provisioner creates the dir as root otherwise.
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: logs
          persistentVolumeClaim:
            claimName: minigolf-logs
